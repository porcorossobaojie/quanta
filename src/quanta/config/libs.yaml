# =============================================================================
# Library and external engine configuration, defining database connection
# settings and data type mappings for cross-engine standardization.
# -----------------------------------------------------------------------------
# 库与外部引擎配置, 定义了数据库连接设置及用于跨引擎标准化的数据类型映射.
# -----------------------------------------------------------------------------

db:
    # =========================================================================
    # Default global database settings.
    # -------------------------------------------------------------------------
    # 默认全局数据库设置.
    # -------------------------------------------------------------------------
    recommand_settings: None

    # =========================================================================
    # Configuration for DuckDB local analytical database.
    # -------------------------------------------------------------------------
    # DuckDB 本地分析型数据库配置.
    # -------------------------------------------------------------------------
    DuckDB:
        recommand_settings:
            path: None
            database: Locals
            schema: jq_data
        data_type:
            TINYINT: 'TINYINT'
            SMALLINT: 'SMALLINT'
            INTEGER: 'INT'
            INT: 'INT'
            BIGINT: 'BIGINT'
            FLOAT: 'FLOAT'
            DOUBLE: 'DOUBLE'
            REAL: 'DOUBLE'
            DECIMAL: 'DECIMAL'
            NUMERIC: 'DECIMAL'
            BOOLEAN: 'BOOLEAN'
            BOOL: 'BOOLEAN'
            VARCHAR: 'VARCHAR'
            TEXT: 'TEXT'
            DATE: 'DATE'
            DATETIME: 'DATETIME'
            TIMESTAMP: 'DATETIME'
            INTERVAL: 'INTERVAL'
            UNDIFINED: 'VARCHAR'
            MPS: [DECIMAL]

    # =========================================================================
    # Configuration for MySQL production database.
    # -------------------------------------------------------------------------
    # MySQL 生产数据库配置.
    # -------------------------------------------------------------------------
    MySQL:
        recommand_settings:
            user: user
            password: password
            mysql_connect: 'mysql+pymysql://'
            charset: utf8mb4
            collate: utf8mb4_general_ci
            chunksize: 64000000
            host: '127.0.0.1'
            port: 3306
            schema: jq_data
        data_type:
            TINYINT: 'TINYINT'
            SMALLINT: 'SMALLINT'
            INTEGER: 'INT'
            INT: 'INT'
            BIGINT: 'BIGINT'
            FLOAT: 'FLOAT'
            DOUBLE: 'DOUBLE'
            REAL: 'DOUBLE'
            DECIMAL: 'DECIMAL'
            NUMERIC: 'DECIMAL'
            BOOLEAN: 'BOOLEAN'
            BOOL: 'BOOLEAN'
            VARCHAR: 'VARCHAR'
            TEXT: 'TEXT'
            DATE: 'DATE'
            DATETIME: 'DATETIME'
            TIMESTAMP: 'DATETIME'
            UNDIFINED: 'VARCHAR(255)'
            MPS: [INTEGER, FLOAT, REAL, DOUBLE, DECIMAL, VARCHAR]
