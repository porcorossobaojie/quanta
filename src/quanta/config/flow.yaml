# =============================================================================
# Data flow and processing configuration, defining listing criteria,
# asset status filters, and trade key mappings.
# -----------------------------------------------------------------------------
# 数据流与处理配置, 定义了上市标准, 资产状态过滤及交易键映射.
# -----------------------------------------------------------------------------

# =============================================================================
# Default start date for historical data processing.
# -----------------------------------------------------------------------------
# 历史数据处理的默认起始日期.
# -----------------------------------------------------------------------------
start_date: '2014-01-01'

# =============================================================================
# Attribute name used when registering extended operations to Pandas.
# -----------------------------------------------------------------------------
# 注册到 Pandas 扩展操作时使用的属性名称.
# -----------------------------------------------------------------------------
extra_pandas_attrname: 'f'

# =============================================================================
# Criteria for determining asset listing status.
# -----------------------------------------------------------------------------
# 确定资产上市状态的标准.
# -----------------------------------------------------------------------------
listing:
    astock_listing_date: list_date
    astock_delisting_date: delist_date
    afund_listing_date: shares
    astock_list:
        table: astockstatus
        column: name

# =============================================================================
# Mappings for asset status indicators (e.g., ST status, tradability).
# -----------------------------------------------------------------------------
# 资产状态指标的映射 (例如 ST 状态, 可交易性).
# -----------------------------------------------------------------------------
status:
    not_st: public_status_id
    tradestatus: tradestatus

# =============================================================================
# Standard keys for trading data fields like prices and returns.
# -----------------------------------------------------------------------------
# 交易数据字段的标准键, 如价格和收益率.
# -----------------------------------------------------------------------------
trade_keys: &public_keys
    returns: ret
    avgprice: avgprice
    avgprice_adj: avgprice_adj
    high: high
    high_limit: high_limit
    low: low
    low_limit: low_limit
    close: close
    close_adj: close_adj
    preclose: preclose
    preclose_adj: preclose_adj
    tradestatus: tradestatus
    post_factor: post_factor

cap:
    <<: *public_keys
    trade_price: avgprice
    settle_price: close
    unit_types: [weight, share, assets]
    state_types: [signal, order, trade, settle]
    recommand_settings:
        is_adj: True
        trade_cost: 0.0015
        untrade_limit: 0.01
        unit: weight
        state: signal
        cash: 0
        price_mapping:
            signal: close
            order: preclose
            trade: avgprice
            settle: close


# =============================================================================
# Mapping between index identifiers and their respective codes or components.
# -----------------------------------------------------------------------------
# 指数标识符与其各自代码或成份股之间的映射.
# -----------------------------------------------------------------------------
index_mapping:
    'star': ['002', '300', '688', '301']
    '50': '000016.XSHG'
    '000016': '000016.XSHG'
    '000016.XSHG': '000016.XSHG'
    '300': '399300.XSHE'
    '399300': '399300.XSHE'
    '399300.XSHE': '399300.XSHE'
    '500': '000905.XSHG'
    '000905': '000905.XSHG'
    '000905.XSHG': '000905.XSHG'
    '1000': '000852.XSHG'
    '000852': '000852.XSHG'
    '000852.XSHG': '000852.XSHG'
    '2000': '399303.XSHE'
    '399303': '399303.XSHE'
    '399303.XSHE': '399303.XSHE'
    'full': '399317.XSHE'
    '399317': '399317.XSHE'
    '399317.XSHE': '399317.XSHE'
