# get from flow.yaml -> trade_keys as keys
#                    -> index_mapping as benchmark mapping

finance_keys:
    total_assets: 'balance-total_assets'

    total_liab: 'total_liability'
    long_liab: 'total_non_current_liability'

    oper_rev: 'income-operating_revenue'

    net_profit: 'income-net_profit'
    oper_cash: 'net_operate_cash_flow' # 经营活动产生的现金流量净额(元)
    inv_cash: 'net_invest_cash_flow' # 投资活动产生的现金流量净额(元)
    net_cashflow: 'cash_equivalent_increase' # 现金及等价物增加额
    cash_and_equity: 'cash_and_equivalents_at_end' # 期末现金及等价物总额

    deprec: fixed_assets_depreciation # 折旧
    inv_depre: investment_property_depreciation # 投资性房地产的折旧及摊销
    inta_amort: intangible_assets_amortization # 无形资产摊销
    long_amort: defferred_expense_amortization # 长期摊销

    val_mv: val_mv
    cur_mv: cur_mv
    pe: pe_ttm
    pcf: pcf
    pocf: pocf
    pb: pb
    turnover: 'free_turnover'
